{% extends "base.html" %}

{% block title %}Edit Drive{% endblock %}

{% block content %}

<div class="container mt-4">
    <h2 class="text-center mb-4">Edit Drive</h2>

    <div class="card p-4 shadow">
        <form method="POST">

            <div class="mb-3">
                <label>Title</label>
                <input type="text" name="title" class="form-control" value="{{ drive[2] }}">
            </div>

            <div class="mb-3">
                <label>Description</label>
                <input type="text" name="description" class="form-control" value="{{ drive[3] }}">
            </div>

            <div class="mb-3">
                <label>Skills</label>
                <input type="text" name="skills" class="form-control" value="{{ drive[4] }}">
            </div>

            <div class="mb-3">
                <label>Experience</label>
                <input type="text" name="experience" class="form-control" value="{{ drive[5] }}">
            </div>

            <div class="mb-3">
                <label>Salary</label>
                <input type="text" name="salary" class="form-control" value="{{ drive[6] }}">
            </div>

            <button class="btn btn-primary w-100">Update Drive</button>

        </form>
    </div>
</div>

{% endblock %}
