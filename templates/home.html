{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<div class="container mt-5 text-center">

    <h1 class="mb-3">Placement Portal</h1>

    <p class="text-muted mb-4">
        A complete platform for students, companies, and administrators to manage placement drives efficiently.
    </p>

    <div class="row justify-content-center">
        <div class="col-md-4">

            <a href="{{ url_for('login') }}" class="btn btn-primary w-100 mb-3">
                Login
            </a>

            <a href="{{ url_for('register') }}" class="btn btn-success w-100 mb-3">
                Student Register
            </a>

            <a href="{{ url_for('company_register') }}" class="btn btn-outline-secondary w-100">
                Company Register
            </a>

        </div>
    </div>

</div>

{% endblock %}
