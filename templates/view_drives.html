{% extends "base.html" %}

{% block title %}Available Drives{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2 class="text-center mb-4">Available Placement Drives</h2>

    <div class="table-responsive">
        <table class="table table-bordered table-striped text-center">

            <thead class="table-dark">
                <tr>
                    <th>Title</th>
                    <th>Company</th>
                    <th>Skills</th>
                    <th>Experience</th>
                    <th>Salary</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for d in drives %}
                <tr>
                    <td>{{ d[1] }}</td>
                    <td>{{ d[2] }}</td>
                    <td>{{ d[3] }}</td>
                    <td>{{ d[4] }}</td>
                    <td>{{ d[5] }}</td>

                    <td>
                        <form method="POST" action="{{ url_for('apply', drive_id=d[0]) }}">
                            <button class="btn btn-primary btn-sm">
                                Apply
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>

    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mt-3">
        Back to Dashboard
    </a>

</div>

{% endblock %}
