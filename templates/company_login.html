{% extends "base.html" %}

{% block title %}Company Login{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow">

            <h3 class="text-center">Company Login</h3>

            <form method="POST" action="{{ url_for('company_login') }}">

                <div class="mb-3">
                    <label>Email:</label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>

                 <div class="mb-3">
                    <label>Password:</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button class="btn btn-primary w-100">Company Login</button>
            </form>

            <hr>
            <p class="text-center">Don't have an account?</p>
            <a href="{{ url_for('company_register') }}" class="btn btn-success w-100 mb-2">Company Register</a>


        </div>
    </div>
</div>

{% endblock %}
